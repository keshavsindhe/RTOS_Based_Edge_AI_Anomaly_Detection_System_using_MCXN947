# Available runners configured by board.cmake.
runners:
- linkserver
- jlink

# Default flash runner if --runner is not given.
flash-runner: linkserver

# Default debug runner if --runner is not given.
debug-runner: linkserver

# Common runner configuration values.
config:
  board_dir: C:/Users/A544483/Desktop/NXP/frdm_mcxn947/mcuxsdk/examples/_boards/frdmmcxn947
  # Build outputs:
  bin_file: edge_ai_vibration_cm33_core0.bin
  elf_file: edge_ai_vibration_cm33_core0.elf
  hex_file: edge_ai_vibration_cm33_core0.hex
  # Host tools:
  gdb: C:/Users/A544483/.mcuxpressotools/arm-gnu-toolchain-14.2.rel1-mingw-w64-x86_64-arm-none-eabi/bin/arm-none-eabi-gdb.exe

# Runner specific arguments
args:
  linkserver:
    - --dt-flash=y
    - --device=MCXN947:FRDM-MCXN947
    - --core=cm33_core0
  jlink:
    - --dt-flash=y
    - --device=MCXN947_M33_0
